<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Dashboard — SH scrubly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-page { min-height: 100vh; background: var(--bg); padding: 40px 20px; }
    #admin-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .admin-login-box { background: var(--card); padding: 48px; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); max-width: 420px; width: 100%; text-align: center; }
    .admin-login-box img { width: 100px; height: 100px; margin: 0 auto 24px; border-radius: 50%; }
    .admin-login-box h2 { margin-bottom: 12px; font-size: 1.8rem; }
    .admin-login-box p { color: var(--text-muted); margin-bottom: 32px; font-size: 0.9rem; }
    .admin-login-box input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: var(--radius-md); font-size: 0.95rem; margin-bottom: 16px; outline: none; background: var(--bg); }
    .admin-login-box input:focus { border-color: var(--primary); }
    .admin-login-box button { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all var(--transition); }
    .admin-login-box button:hover { background: var(--primary-light); transform: translateY(-2px); }
    #admin-dashboard { display: none; }
    .admin-header { background: var(--card); padding: 24px 32px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .admin-header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 14px; }
    .admin-header h1 img { width: 50px; height: 50px; border-radius: 50%; }
    .admin-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .admin-tabs { display: flex; gap: 12px; background: var(--card); padding: 12px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); margin-bottom: 24px; flex-wrap: wrap; }
    .admin-tab-btn { padding: 12px 24px; border-radius: var(--radius-md); background: transparent; border: none; font-size: 0.9rem; font-weight: 600; color: var(--text-light); cursor: pointer; transition: all var(--transition); }
    .admin-tab-btn.active { background: var(--primary); color: #fff; }
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }
    .admin-table-container { background: var(--card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table thead { background: var(--bg-warm); }
    .admin-table th { padding: 16px; text-align: left; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    .admin-table td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .admin-table tbody tr:hover { background: var(--bg); }
    .admin-empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    
    /* Product Modal */
    #product-modal { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
    #product-modal.open { display: flex; }
    .product-modal-content { background: var(--card); border-radius: var(--radius-xl); max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); }
    .product-modal-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .product-modal-body { padding: 28px; }
    .product-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .product-form-full { grid-column: 1 / -1; }
    .product-colors-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .product-sizes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
    .size-checkbox-label { display: flex; align-items: center; padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition); background: var(--bg); }
    .size-checkbox-label:hover { border-color: var(--primary); }
    .size-checkbox-label input { margin-right: 8px; }
    .size-checkbox-label input:checked + span { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body class="admin-page">

  <!-- Login Gate -->
  <div id="admin-gate">
    <div class="admin-login-box">
      <img src="logo.jpg" alt="SH scrubly">
      <h2>Admin Login</h2>
      <p>Enter your password to access the dashboard</p>
      <form onsubmit="event.preventDefault(); const pw = this.querySelector('input').value; if(pw === getAdminPassword()) { sessionStorage.setItem('sh_admin_auth', 'true'); document.getElementById('admin-gate').style.display = 'none'; document.getElementById('admin-dashboard').style.display = 'block'; initAdmin(); } else { showToast('Incorrect password', 'error'); }">
        <input type="password" placeholder="Password" required autofocus>
        <button type="submit">Login</button>
      </form>
      <p style="margin-top: 20px; font-size: 0.75rem; opacity: 0.6;">Default password: scrubly2025</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-dashboard">
    <div class="container" style="max-width: 1400px;">
      
      <!-- Header -->
      <div class="admin-header">
        <h1>
          <img src="logo.jpg" alt="SH scrubly">
          <span>Admin Dashboard</span>
        </h1>
        <div class="admin-actions">
          <button class="btn btn-primary" onclick="openProductModal()">+ Add Product</button>
          <button class="btn btn-outline" onclick="if(confirm('Change admin password?')) { const newPw = prompt('Enter new password:'); if(newPw) { setAdminPassword(newPw); showToast('Password changed successfully'); } }">Change Password</button>
          <button class="btn btn-outline" onclick="sessionStorage.removeItem('sh_admin_auth'); location.reload()">Logout</button>
        </div>
      </div>

      <!-- Stats -->
      <div id="admin-stats-container"></div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchAdminTab('products')">Products</button>
        <button class="admin-tab-btn" onclick="switchAdminTab('orders')">Orders</button>
      </div>

      <!-- Products Tab -->
      <div id="tab-products" class="admin-tab-content active">
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Gender</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-products-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Orders Tab -->
      <div id="tab-orders" class="admin-tab-content">
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="admin-orders-tbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Product Modal -->
  <div id="product-modal">
    <div class="product-modal-content">
      <div class="product-modal-header">
        <h3>Add / Edit Product</h3>
        <button class="cart-close" onclick="closeProductModal()">&times;</button>
      </div>
      <div class="product-modal-body">
        <form id="product-form" onsubmit="submitProductForm(event)">
          <div class="product-form-grid">
            <div class="form-group">
              <label>Product Name *</label>
              <input type="text" name="name" placeholder="Classic Scrub Top" required style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);">
            </div>
            <div class="form-group">
              <label>Price (EGP) *</label>
              <input type="number" name="price" placeholder="299.00" step="0.01" min="0" required style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);">
            </div>
            <div class="form-group">
              <label>Category *</label>
              <select name="category" required style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);cursor:pointer;">
                <option value="scrubs">Scrubs</option>
                <option value="Lab Coats">Lab Coats</option>
              </select>
            </div>
            <div class="form-group">
              <label>Gender *</label>
              <select name="sub" required style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);cursor:pointer;">
                <option value="women">Women</option>
                <option value="men">Men</option>
              </select>
            </div>
          </div>
          
          <div class="product-form-full form-group" style="margin-top:20px;">
            <label>Description</label>
            <textarea name="desc" placeholder="Premium quality scrubs made from breathable fabric..." rows="3" style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);resize:vertical;font-family:inherit;"></textarea>
          </div>
          
          <div class="product-form-full form-group" style="margin-top:20px;">
            <label>Image URL</label>
            <input type="url" id="final-image-value" placeholder="https://images.unsplash.com/photo-..." style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);">
            <small style="display:block;margin-top:6px;font-size:0.75rem;color:var(--text-muted);">Leave empty for random placeholder image</small>
          </div>
          
          <div class="product-form-full form-group" style="margin-top:20px;">
            <label>Badge (optional)</label>
            <input type="text" name="badge" placeholder="NEW, SALE, BESTSELLER..." style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;outline:none;background:var(--bg);">
          </div>
          
          <div class="product-form-full form-group" style="margin-top:20px;">
            <div class="product-colors-header">
              <label style="margin:0;">Available Colors</label>
              <button type="button" onclick="addColorField()" style="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;">+ Add Color</button>
            </div>
            <div id="product-colors-container"></div>
          </div>
          
          <div class="product-form-full form-group" style="margin-top:20px;">
            <label>Available Sizes *</label>
            <div class="product-sizes-grid">
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="XS">
                <span>XS</span>
              </label>
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="S">
                <span>S</span>
              </label>
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="M">
                <span>M</span>
              </label>
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="L">
                <span>L</span>
              </label>
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="XL">
                <span>XL</span>
              </label>
              <label class="size-checkbox-label">
                <input type="checkbox" name="sizes" value="XXL">
                <span>XXL</span>
              </label>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:28px;">Save Product</button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function switchAdminTab(tab) {
      // Update buttons
      document.querySelectorAll('.admin-tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Update content
      document.querySelectorAll('.admin-tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
    }
  </script>
</body>
</html>
